x-base: &base
  tty: true
  env_file: .env.local
  networks:
    botfi.localhost: {}
  volumes: &base_volumes
    - .devcontainer/.npmrc:/root/.npmrc:ro
    - .:/workspace
  build:
    context: .
    dockerfile: .devcontainer/Dockerfile

services:
  platform:
    <<: *base
    container_name: repo-template.botfi.localhost
    hostname: repo-template.botfi.localhost
    working_dir: /workspace/platform
    env_file: platform/.env.local
    volumes:
      - platform-vscode-server:/root/.vscode-server
      - platform-pnpm:/pnpm
      - .devcontainer/.npmrc:/root/.npmrc:ro
      - .:/workspace
    networks:
      botfi.localhost:
        aliases:
          - web-repo-template.botfi.localhost
    ports:
      - 15000:15000 # web app
volumes:
  platform-vscode-server: {}
  platform-pnpm: {}
